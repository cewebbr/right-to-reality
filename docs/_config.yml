# Site Settings
title: "Right to Reality"
description: "Right to Reality Manifesto"
url: "https://cewebbr.github.io/"
baseurl: "/right-to-reality" 

# Author
author:
  name: "Ceweb.br"
  email: "ceweb@nic.br"
  
# Theme
# remote_theme: pages-themes/slate@v0.2.0
remote_theme: brandoncardoso/hima

hima: 
   colorscheme: dark
   background_color: "#092D46"
   font_color: "#C0E1D7"
   
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  # - github-pages

feed:
  enabled: false
  
# Markdown & Syntax Highlighting
markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM
  syntax_highlighter: rouge

# Permalinks
permalink: pretty

# Exclude from build
exclude:
  - node_modules
  - vendor
  - README.md
  - LICENSE

# Collections (optional)
# collections:
#   docs:
#     output: true
#     permalink: /:collection/:name

# Default Front Matter (optional)
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "default"

