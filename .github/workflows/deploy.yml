name: Deploy Jekyll Site
on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll from docs folder
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs
          destination: ./_site
          # This forces Jekyll to read the config file inside the docs folder
          build_opts: "--config ./docs/_config.yml" 

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
